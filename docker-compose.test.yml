services:
  database:
    image: abhyas01/ecommerce-database:latest
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  product-service:
    image: abhyas01/product-service:latest
    environment:
      DB_HOST: database
      DB_NAME: ecommerce
      DB_USER: postgres
      DB_PASSWORD: password
      DB_PORT: 5432
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  order-service:
    image: abhyas01/order-service:latest
    environment:
      DB_HOST: database
      DB_NAME: ecommerce
      DB_USER: postgres
      DB_PASSWORD: password
      DB_PORT: 5432
      PRODUCT_SERVICE_HOST: product-service
      PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      database:
        condition: service_healthy
      product-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  frontend:
    image: abhyas01/ecommerce-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
